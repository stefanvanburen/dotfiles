# configuration for https://beets.io
# https://beets.readthedocs.io/en/stable/reference/config.html
#
# To install `beets` on macOS:
#
# $ brew install uv
# $ uv tool install beets --with requests --with certifi

# Store music library in ~/Documents/music, which is on iCloud
directory: ~/Documents/music

# https://beets.readthedocs.io/en/stable/plugins/index.html
#
# https://beets.readthedocs.io/en/stable/plugins/embedart.html
# https://beets.readthedocs.io/en/stable/plugins/fetchart.html
# https://beets.readthedocs.io/en/stable/plugins/fish.html
# https://beets.readthedocs.io/en/stable/plugins/info.html
# https://beets.readthedocs.io/en/stable/plugins/musicbrainz.html
# https://beets.readthedocs.io/en/stable/plugins/convert.html
plugins: convert embedart fetchart fish info musicbrainz

# Keep the library playable in Music.app: transcode lossless imports
# (e.g. FLAC) to ALAC, leaving already-lossy files untouched.
convert:
    auto: yes
    format: alac
    never_convert_lossy_files: yes
    # `beet convert -k` swaps converted files into the library and moves
    # the originals here.
    dest: ~/Music/flac-originals
    # For lossy formats (e.g. opus from YouTube) that Music.app can't play,
    # use: beet convert -f aac -k <query>  (uses beets' built-in aac preset)
